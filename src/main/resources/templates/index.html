<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AES Secure Vault</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            width: 480px;
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
        }

        h1 { text-align: center; margin-bottom: 4px; }
        .subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 20px; }

        label { font-size: 13px; font-weight: 500; margin-top: 14px; display: block; }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-top: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-primary { background: #2563eb; color: #fff; }
        .btn-secondary { background: #e5e7eb; }

        .divider { height: 1px; background: #eee; margin: 22px 0; }

        .key-row { display: flex; gap: 8px; }
        .key-row button { width: 38%; }

        .strength-bar {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.4s ease, background 0.4s ease;
        }

        .weak { background: #dc2626; }
        .medium { background: #f59e0b; }
        .strong { background: #16a34a; }

        .strength-text { font-size: 12px; margin-top: 6px; }

        .success { color: #16a34a; text-align: center; font-size: 13px; }
        .error { color: #dc2626; text-align: center; font-size: 13px; }

        .preview { text-align: center; margin-top: 12px; }

        .preview img {
            width: 160px;
            border: 1px solid #ddd;
            padding: 6px;
        }

        .download-link {
            display: block;
            margin-top: 8px;
            font-size: 13px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>
<div class="card">

<h1>AES Secure Vault</h1>
<div class="subtitle">Dynamic Key Generation & Multi-Layer Security</div>

<p th:if="${message}" class="success" th:text="${message}"></p>
<p th:if="${error}" class="error" th:text="${error}"></p>

<label>Secret Key</label>
<div class="key-row">
    <input type="text" id="secretKey">
    <button class="btn-secondary" type="button" onclick="generateKey()">Generate</button>
</div>

<div class="strength-bar">
    <div id="strengthFill" class="strength-fill"></div>
</div>
<div id="strengthText" class="strength-text">Waiting for key</div>

<div class="divider"></div>

<form th:action="@{/encrypt}" method="post" enctype="multipart/form-data"
      onsubmit="attachKey()">
    <label>Encrypt File</label>
    <input type="file" name="file" required>
    <input type="hidden" name="key" id="encryptKey">
    <button class="btn-primary">Encrypt</button>
</form>

<form th:action="@{/decrypt}" method="post" enctype="multipart/form-data"
      onsubmit="attachKey()">
    <label>Decrypt File</label>
    <input type="file" name="file" required>
    <input type="hidden" name="key" id="decryptKey">
    <button class="btn-primary">Decrypt</button>
</form>

<div class="preview" th:if="${downloadFile}">
    <a class="download-link" th:href="@{/download/{f}(f=${downloadFile})}" download>
        ⬇ Download Processed File
    </a>
</div>

<div class="divider"></div>

<h3 style="text-align:center;font-size:14px;">Advanced Key Security (Stage-2)</h3>

<button class="btn-secondary" type="button" onclick="generateQrStage2()">Generate QR for Key</button>

<div id="qrContainer" class="preview" style="display:none;">
    <img id="qrImage">
    <a id="qrDownload" class="download-link" download>⬇ Download QR Code</a>
</div>

<label>Cover Image (PNG)</label>
<input type="file" id="coverImage">
<button class="btn-secondary" type="button" onclick="hideKeyStage2()">Hide Key in Image</button>

<div id="stegoContainer" class="preview" style="display:none;">
    <img id="stegoImagePreview">
    <a id="stegoDownload" class="download-link" download>⬇ Download Stego Image</a>
</div>

<label>Stego Image</label>
<input type="file" id="stegoImage">
<button class="btn-secondary" type="button" onclick="extractKeyStage2()">Extract Key</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const secretKey = document.getElementById("secretKey");
    const strengthFill = document.getElementById("strengthFill");
    const strengthText = document.getElementById("strengthText");

    window.attachKey = () => {
        encryptKey.value = secretKey.value;
        decryptKey.value = secretKey.value;
    };

    window.generateKey = () => {
        fetch("/generateKey")
            .then(r => r.text())
            .then(k => { secretKey.value = k; updateStrength(); });
    };

    window.updateStrength = () => {
        const len = secretKey.value.length;

        strengthFill.style.width = "0%";
        strengthFill.className = "strength-fill";

        if (len === 16) {
            strengthFill.style.width = "40%";
            strengthFill.classList.add("weak");
            strengthText.innerText = "AES-128 (Weak)";
        } else if (len === 24) {
            strengthFill.style.width = "70%";
            strengthFill.classList.add("medium");
            strengthText.innerText = "AES-192 (Medium)";
        } else if (len === 32) {
            strengthFill.style.width = "100%";
            strengthFill.classList.add("strong");
            strengthText.innerText = "AES-256 (Strong)";
        } else if (len > 0) {
            strengthText.innerText = "Invalid AES key length";
        } else {
            strengthText.innerText = "Waiting for key";
        }
    };

    window.generateQrStage2 = () => {
        fetch("/stage2/generateQr", {
            method:"POST",
            headers:{'Content-Type':'application/x-www-form-urlencoded'},
            body:"key="+secretKey.value
        }).then(r=>r.text()).then(url=>{
            qrImage.src = url;
            qrDownload.href = url;
            qrContainer.style.display="block";
        });
    };

    window.hideKeyStage2 = () => {
        const fd=new FormData();
        fd.append("key",secretKey.value);
        fd.append("image",coverImage.files[0]);
        fetch("/stage2/hideKey",{method:"POST",body:fd})
            .then(r=>r.text()).then(url=>{
                stegoImagePreview.src=url;
                stegoDownload.href=url;
                stegoContainer.style.display="block";
            });
    };

    window.extractKeyStage2 = () => {
        const fd=new FormData();
        fd.append("image",stegoImage.files[0]);
        fetch("/stage2/extractKey",{method:"POST",body:fd})
            .then(r=>r.text()).then(k=>{
                secretKey.value=k;
                updateStrength();
            });
    };

    secretKey.addEventListener("keyup", updateStrength);
});
</script>
</body>
</html>
